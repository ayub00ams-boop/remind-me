name: remind_me
description: "Bangla/English reminder app with natural language parsing"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.0
  android_alarm_manager_plus: ^5.0.0
  timezone: ^0.10.0
  flutter_timezone: ^3.0.0
  permission_handler: ^11.0.0
  sqflite: ^2.4.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_bloc: ^9.1.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/